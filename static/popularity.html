<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popularity — PokéValue</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <div class="hero">
      <p class="hero-title">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif"
             style="width:48px;height:48px;image-rendering:pixelated;vertical-align:middle;margin-right:12px;">
        PokéValue &amp; PokéCross
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/6.gif"
             style="width:48px;height:48px;image-rendering:pixelated;vertical-align:middle;margin-left:12px;">
      </p>
      <p class="hero-sub">Card Valuation Tool and Fun 2D Game</p>
    </div>

    <div class="section-header">
      <h2>Popularity Rankings</h2>
      <p>Fan sentiment scores across all 1025 Pokémon · community polls &amp; cultural impact</p>
    </div>

    <div id="pop-grid-1" class="pop-grid"></div>
    <div style="margin:0.6rem 0;"></div>
    <div id="pop-grid-2" class="pop-grid"></div>

    <hr>

    <div id="stats" class="stat-row">
      <div class="stat-box"><div class="stat-val">…</div><div class="stat-lbl">CARDS IN DB</div></div>
      <div class="stat-box"><div class="stat-val">…</div><div class="stat-lbl">SETS</div></div>
      <div class="stat-box"><div class="stat-val">…</div><div class="stat-lbl">RARE+ CARDS</div></div>
      <div class="stat-box"><div class="stat-val">…</div><div class="stat-lbl">TRACKED SPECIES</div></div>
    </div>
  </div>

  <script src="/static/nav.js"></script>
  <script>
    function renderGrid(entries, id) {
      document.getElementById(id).innerHTML = entries.map(function (e) {
        var score = parseFloat(e.score);
        var color = score >= 75 ? '#FFDE00' : (score >= 55 ? '#f97316' : '#9ca3af');
        var img = e.image_url
          ? '<img src="' + e.image_url + '" alt="' + e.name + '">'
          : '<div class="pop-no-img">?</div>';
        return '<div class="pop-card">' + img +
          '<div class="pop-name">' + e.name.toUpperCase() + '</div>' +
          '<div class="pop-bar-bg"><div class="pop-bar" style="width:' + score.toFixed(0) + '%;background:' + color + ';"></div></div>' +
          '<div class="pop-score">' + score.toFixed(0) + ' / 100</div>' +
          '</div>';
      }).join('');
    }

    fetch('/api/popularity')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        renderGrid(data.top20.slice(0, 10), 'pop-grid-1');
        renderGrid(data.top20.slice(10, 20), 'pop-grid-2');
        var s = data.stats;
        document.getElementById('stats').innerHTML = [
          [s.total_cards.toLocaleString(), 'CARDS IN DB'],
          [s.total_sets,                   'SETS'],
          [s.rare_count.toLocaleString(),  'RARE+ CARDS'],
          [s.tracked_species,              'TRACKED SPECIES'],
        ].map(function (r) {
          return '<div class="stat-box"><div class="stat-val">' + r[0] + '</div><div class="stat-lbl">' + r[1] + '</div></div>';
        }).join('');
      })
      .catch(function () {
        document.getElementById('pop-grid-1').innerHTML = '<p class="alert alert-error">Failed to load popularity data.</p>';
      });
  </script>
</body>
</html>
