<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection — PokéValue</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
  <style>
    .auth-wrap { max-width:380px; margin:2rem auto; }
    .add-row   { display:flex; gap:0.75rem; margin-bottom:0.75rem; }
    .add-row input { flex:1; }
    .user-bar  { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="page">
    <h2>My Collection</h2>

    <div id="auth-section">
      <p style="color:#ccc;margin-bottom:1.5rem;">Create an account or log in to track your cards.</p>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <div class="auth-wrap" id="form-login">
        <div class="form-group"><label>Username</label><input type="text" id="l-user"></div>
        <div class="form-group"><label>Password</label><input type="password" id="l-pass"></div>
        <div id="login-msg"></div>
        <button class="btn btn-full" onclick="doLogin()">LOG IN</button>
      </div>

      <div class="auth-wrap" id="form-register" style="display:none;">
        <div class="form-group"><label>Choose a username</label><input type="text" id="r-user"></div>
        <div class="form-group"><label>Choose a password</label><input type="password" id="r-pass"></div>
        <div class="form-group"><label>Confirm password</label><input type="password" id="r-pass2"></div>
        <div id="register-msg"></div>
        <button class="btn btn-full" onclick="doRegister()">CREATE ACCOUNT</button>
      </div>
    </div>

    <div id="logged-section" style="display:none;">
      <div class="user-bar">
        <p style="color:#aaa;margin:0;">Logged in as <span id="username-label" style="color:#FFDE00;font-weight:bold;"></span> &middot; <span id="card-count">0</span> cards</p>
        <button class="btn" onclick="doLogout()">Log Out</button>
      </div>
      <hr>

      <h4 style="color:#FFDE00;margin-bottom:0.75rem;">Add Cards</h4>
      <div class="add-row">
        <input type="text" id="add-query" placeholder="Search Pokémon card name…">
        <button class="btn" onclick="doAddSearch()">Search</button>
      </div>
      <div id="add-msg"></div>
      <select id="add-select" style="display:none;margin-bottom:0.75rem;"></select>
      <div id="add-card-preview"></div>

      <hr>

      <h4 style="color:#FFDE00;margin-bottom:0.75rem;">My Cards</h4>
      <div id="collection-grid" class="collection-grid"></div>
    </div>
  </div>

  <script src="/static/nav.js?v=5"></script>
  <script>
    var CONDITIONS = ['NM', 'LP', 'MP', 'HP', 'Damaged'];
    var CONDITION_COLORS = {NM:'#4CAF50',LP:'#8BC34A',MP:'#FFC107',HP:'#FF5722',Damaged:'#9E9E9E'};
    var addResults = [], user = null;

    function saveUser(u) { user = u; localStorage.setItem('pv_user', JSON.stringify(u)); }
    function loadUser() { try { return JSON.parse(localStorage.getItem('pv_user') || 'null'); } catch (e) { return null; } }
    function clearUser() { user = null; localStorage.removeItem('pv_user'); }

    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? '' : 'none';
    }

    function showLoggedIn(u) {
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('logged-section').style.display = 'block';
      document.getElementById('username-label').textContent = u.username;
      loadCollection();
    }

    function doLogin() {
      var msg = document.getElementById('login-msg');
      msg.innerHTML = '';
      fetch('/api/auth/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:document.getElementById('l-user').value,password:document.getElementById('l-pass').value}),
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (e) { throw new Error(e.detail); });
        return r.json();
      }).then(function (u) { saveUser(u); showLoggedIn(u); })
        .catch(function (e) { msg.innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; });
    }

    function doRegister() {
      var msg = document.getElementById('register-msg');
      var pass = document.getElementById('r-pass').value;
      if (pass !== document.getElementById('r-pass2').value) { msg.innerHTML = '<div class="alert alert-error">Passwords don\'t match.</div>'; return; }
      fetch('/api/auth/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:document.getElementById('r-user').value,password:pass}),
      }).then(function (r) {
        if (!r.ok) return r.json().then(function (e) { throw new Error(e.detail); });
        return r.json();
      }).then(function () {
        fetch('/api/auth/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({username:document.getElementById('r-user').value,password:pass}),
        }).then(function (r) { return r.json(); }).then(function (u) { saveUser(u); showLoggedIn(u); });
      }).catch(function (e) { msg.innerHTML = '<div class="alert alert-error">' + e.message + '</div>'; });
    }

    function doLogout() { clearUser(); location.reload(); }

    function loadCollection() {
      fetch('/api/collection/' + user.id)
        .then(function (r) { return r.json(); })
        .then(function (cards) {
          document.getElementById('card-count').textContent = cards.length;
          var grid = document.getElementById('collection-grid');
          if (!cards.length) {
            grid.innerHTML = '<p style="color:#888;text-align:center;padding:2rem;grid-column:1/-1;">No cards yet — search above to add some!</p>';
            return;
          }
          grid.innerHTML = cards.map(function (c) {
            var bgColor = CONDITION_COLORS[c.condition] || '#9E9E9E';
            var img = c.image_url
              ? '<img src="' + c.image_url + '" alt="' + c.card_name + '">'
              : '<div style="height:140px;background:#0d0f1a;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#555;">No image</div>';
            return '<div class="collection-card">' + img +
              '<div class="collection-card-name">' + c.card_name + '</div>' +
              '<div class="collection-card-set">' + (c.set_name || '') + '</div>' +
              '<div><span class="condition-badge" style="background:' + bgColor + ';">' + c.condition + '</span></div>' +
              '<button class="btn btn-full" style="margin-top:0.4rem;font-size:0.65rem;padding:0.35rem;" onclick="removeCard(' + c.id + ')">Remove</button>' +
              '</div>';
          }).join('');
        });
    }

    function removeCard(entryId) {
      fetch('/api/collection/' + user.id + '/' + entryId, {method:'DELETE'}).then(function () { loadCollection(); });
    }

    function doAddSearch() {
      var q = document.getElementById('add-query').value.trim();
      if (!q) return;
      document.getElementById('add-msg').innerHTML = '<span class="spinner"></span>';
      fetch('/api/search?q=' + encodeURIComponent(q))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          document.getElementById('add-msg').innerHTML = '';
          if (!data.length) { document.getElementById('add-msg').innerHTML = '<div class="alert alert-warning">No results.</div>'; return; }
          addResults = data;
          var sel = document.getElementById('add-select');
          sel.style.display = 'block';
          sel.innerHTML = data.map(function (c, i) {
            return '<option value="' + i + '">' + c.name + ' — ' + c.set_name + ' #' + c.number + ' (' + (c.rarity || '?') + ')</option>';
          }).join('');
          renderAddPreview(0);
        });
    }

    function renderAddPreview(idx) {
      var c = addResults[idx];
      if (!c) return;
      var condOpts = CONDITIONS.map(function (cond) { return '<option value="' + cond + '">' + cond + '</option>'; }).join('');
      document.getElementById('add-card-preview').innerHTML =
        '<div style="display:flex;align-items:center;gap:1rem;margin:0.75rem 0;background:#1a1d30;padding:0.75rem;border-radius:8px;border:1px solid #2a2d45;">' +
        '<div><strong style="color:#FFDE00;">' + c.name + '</strong><br>' +
        '<span style="color:#9ca3af;font-size:0.8rem;">' + c.set_name + ' &middot; #' + c.number + '</span><br>' +
        '<em style="font-size:0.8rem;color:#6b7280;">' + (c.rarity || 'Unknown rarity') + '</em></div>' +
        '<div style="margin-left:auto;display:flex;align-items:center;gap:0.75rem;">' +
        '<select id="cond-select" style="width:100px;">' + condOpts + '</select>' +
        '<button class="btn" onclick="doAddCard()">Add</button></div></div>';
    }

    function doAddCard() {
      var idx = parseInt(document.getElementById('add-select').value || '0');
      var c = addResults[idx];
      if (!c) return;
      fetch('/api/collection/' + user.id + '/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({card_name:c.name,set_name:c.set_name,set_code:c.set_code,number:c.number,rarity:c.rarity,condition:document.getElementById('cond-select').value}),
      }).then(function () {
        document.getElementById('add-select').style.display = 'none';
        document.getElementById('add-card-preview').innerHTML = '<div class="alert alert-success">' + c.name + ' added to your collection!</div>';
        document.getElementById('add-query').value = '';
        loadCollection();
      });
    }

    document.getElementById('add-select').addEventListener('change', function () { renderAddPreview(parseInt(this.value)); });
    document.getElementById('add-query').addEventListener('keydown', function (e) { if (e.key === 'Enter') doAddSearch(); });

    user = loadUser();
    if (user) { showLoggedIn(user); }
  </script>
</body>
</html>
