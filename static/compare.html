<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare — PokéValue</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <style>
    .compare-cols { display:grid; grid-template-columns:1fr 1fr; gap:2rem; }
    .compare-col h3 { color:#FFDE00; margin-bottom:0.75rem; }
    .col-search { display:flex; gap:0.5rem; margin-bottom:0.5rem; }
    .col-search input { flex:1; }
    .winner-banner { border-radius:12px; padding:1rem; text-align:center; margin:1.5rem 0; }
    .winner-label { font-family:'Press Start 2P',monospace; font-size:0.6rem; letter-spacing:.1em; margin-bottom:0.4rem; }
    .winner-name  { font-size:1.4rem; font-weight:700; }
    @media(max-width:700px) { .compare-cols { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="section-header">
      <h2>Compare Cards</h2>
      <p>Search two cards and compare valuations side by side</p>
    </div>

    <div class="compare-cols">
      <div class="compare-col">
        <h3>Card A</h3>
        <div class="col-search">
          <input type="text" id="q-a" placeholder="Card name…">
          <button class="btn" onclick="doSearch('a')">SEARCH</button>
        </div>
        <div id="msg-a"></div>
        <select id="sel-a" style="display:none;width:100%;margin-top:0.5rem;"></select>
      </div>
      <div class="compare-col">
        <h3>Card B</h3>
        <div class="col-search">
          <input type="text" id="q-b" placeholder="Card name…">
          <button class="btn" onclick="doSearch('b')">SEARCH</button>
        </div>
        <div id="msg-b"></div>
        <select id="sel-b" style="display:none;width:100%;margin-top:0.5rem;"></select>
      </div>
    </div>

    <div style="text-align:center;margin:1.5rem 0;">
      <button class="btn" id="analyze-btn" style="padding:0.8rem 2rem;">ANALYZE BOTH</button>
    </div>

    <div id="compare-results" style="display:none;"></div>
  </div>

  <script src="/static/nav.js?v=5"></script>
  <script>
    var TYPE_COLORS = {
      Fire:'#e25822',Water:'#4d9be6',Grass:'#5db85d',Lightning:'#f7d716',
      Psychic:'#e96bb0',Fighting:'#c04a28',Darkness:'#5a5a8a',Metal:'#9badb7',
      Dragon:'#7038f8',Fairy:'#f0a0d0',Colorless:'#a8a878',
    };
    var resultsA = [], resultsB = [];

    function fmtPrice(v) { return v != null ? '$' + parseFloat(v).toFixed(2) : 'N/A'; }
    function recBadge(rec) {
      var map = {'Strong Buy':'badge-strong-buy','Buy':'badge-buy','Hold':'badge-hold','Sell':'badge-sell','Strong Sell':'badge-strong-sell'};
      return '<span class="badge ' + (map[rec] || 'badge-na') + '">' + (rec || 'N/A') + '</span>';
    }
    function typeBadges(types) {
      return (types || []).map(function (t) {
        return '<span class="type-badge" style="background:' + (TYPE_COLORS[t] || '#555') + ';">' + t + '</span>';
      }).join('');
    }
    function signalChips(a) {
      var chips = [];
      if (a.trend === 'no data') chips.push('&#9473; Trend: not enough history');
      else if (a.trend) { var icon = a.trend === 'rising' ? '&#9650;' : (a.trend === 'falling' ? '&#9660;' : '&#9473;'); chips.push(icon + ' ' + a.trend); }
      if (a.volatility) chips.push('&#8776; ' + a.volatility);
      if (a.popularity_score != null) chips.push('&#9733; ' + a.popularity_score.toFixed(0) + '/100');
      if (a.scarcity_score != null)   chips.push('&#10710; ' + a.scarcity_score.toFixed(0));
      return chips.map(function (c) { return '<span class="signal-chip">' + c + '</span>'; }).join('');
    }
    function scoreColor(s) { return s <= -25 ? '#22c55e' : (s < 25 ? '#eab308' : '#ef4444'); }

    function doSearch(side) {
      var q = document.getElementById('q-' + side).value.trim();
      if (!q) return;
      var msgEl = document.getElementById('msg-' + side);
      msgEl.innerHTML = '<span class="spinner"></span>';
      fetch('/api/search?q=' + encodeURIComponent(q))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          msgEl.innerHTML = '';
          if (!data.length) { msgEl.innerHTML = '<div class="alert alert-warning">No results.</div>'; return; }
          if (side === 'a') resultsA = data; else resultsB = data;
          var sel = document.getElementById('sel-' + side);
          sel.style.display = 'block';
          sel.innerHTML = data.map(function (c, i) {
            return '<option value="' + i + '">' + c.name + ' — ' + c.set_name + ' #' + c.number + ' (' + (c.rarity || '?') + ')</option>';
          }).join('');
        });
    }

    function renderSideCard(data, suffix) {
      var a = data.analysis, d = data.details || {}, images = d.images || {};
      var imgUrl = images.large || images.small || '';
      var market = data.market_price || a.average_price;
      var low    = data.low_price    || a.lowest_price;
      var high   = data.high_price   || a.highest_price;
      return '<div class="compare-col">' +
        (imgUrl ? '<img src="' + imgUrl + '" style="width:100%;border-radius:8px;margin-bottom:0.75rem;">' : '<div class="card-no-img" style="height:200px;">&#x1F0CF;</div>') +
        '<strong style="color:#e8e8e8;">' + a.card_name + '</strong>' +
        '<div style="color:#9ca3af;font-size:0.8rem;margin:0.2rem 0 0.5rem;">' + (d.rarity || '') + '</div>' +
        typeBadges(d.types) + '<br>' +
        recBadge(a.recommendation) + '<br><br>' +
        '<div id="gauge-' + suffix + '" style="height:160px;"></div>' +
        '<div class="metric-row">' +
          '<div class="metric-box"><div class="metric-label">Market</div><div class="metric-value">' + fmtPrice(market) + '</div></div>' +
          '<div class="metric-box"><div class="metric-label">Low</div><div class="metric-value">' + fmtPrice(low) + '</div></div>' +
          '<div class="metric-box"><div class="metric-label">High</div><div class="metric-value">' + fmtPrice(high) + '</div></div>' +
        '</div>' +
        '<div class="signal-row">' + signalChips(a) + '</div>' +
        '</div>';
    }

    function makeGauge(score, divId) {
      if (score == null) return;
      var c = scoreColor(score);
      Plotly.newPlot(divId, [{
        type:'indicator', mode:'gauge+number', value:score,
        number:{font:{color:'#FFDE00',size:20},suffix:'/100'},
        gauge:{
          axis:{range:[-100,100],tickcolor:'#6b7280',tickfont:{color:'#6b7280',size:8}},
          bar:{color:c,thickness:0.25}, bgcolor:'#1e2035', bordercolor:'#374151', borderwidth:2,
          steps:[{range:[-100,-25],color:'#0f2d1a'},{range:[-25,25],color:'#1c1917'},{range:[25,100],color:'#2d0f0f'}],
          threshold:{line:{color:'#FFDE00',width:2},thickness:0.75,value:score},
        },
      }], {
        paper_bgcolor:'#0d0f1a', font:{color:'#e8e8e8',family:'Nunito'},
        height:155, margin:{l:10,r:10,t:10,b:10},
      }, {responsive:true, displayModeBar:false});
    }

    document.getElementById('analyze-btn').addEventListener('click', function () {
      var idxA = parseInt(document.getElementById('sel-a').value || '0');
      var idxB = parseInt(document.getElementById('sel-b').value || '0');
      var cA = resultsA[idxA], cB = resultsB[idxB];
      if (!cA || !cB) {
        document.getElementById('compare-results').innerHTML = '<div class="alert alert-warning">Search a card for both sides first.</div>';
        document.getElementById('compare-results').style.display = 'block';
        return;
      }
      document.getElementById('compare-results').innerHTML = '<div style="padding:1rem;"><span class="spinner"></span> Analyzing both cards…</div>';
      document.getElementById('compare-results').style.display = 'block';

      fetch('/api/compare', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          card_a:{card_name:cA.name,set_name:cA.set_name,number:cA.number,card_id:cA.set_code+'-'+cA.number},
          card_b:{card_name:cB.name,set_name:cB.set_name,number:cB.number,card_id:cB.set_code+'-'+cB.number},
        }),
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var a = data.a, b = data.b;
          var sa = a.analysis.composite_score || 0, sb = b.analysis.composite_score || 0;
          var winner = sa < sb ? a.analysis.card_name : (sb < sa ? b.analysis.card_name : 'Tied');
          var wColor = sa !== sb ? '#22c55e' : '#eab308';

          var html = '<div class="winner-banner" style="background:' + wColor + '22;border:2px solid ' + wColor + ';">' +
            '<div class="winner-label" style="color:' + wColor + ';">BETTER BUY</div>' +
            '<div class="winner-name">' + winner + '</div></div>';
          html += '<div class="compare-cols">' + renderSideCard(a,'a') + renderSideCard(b,'b') + '</div>';
          html += '<hr><h3 style="font-size:0.8rem;color:#aaa;">Score Comparison</h3>';
          html += '<p style="font-size:0.75rem;color:#9ca3af;margin:0 0 0.5rem;">Negative = undervalued &middot; Positive = overvalued</p>';
          html += '<div id="bar-chart" style="height:280px;"></div>';

          document.getElementById('compare-results').innerHTML = html;
          makeGauge(sa, 'gauge-a');
          makeGauge(sb, 'gauge-b');

          Plotly.newPlot('bar-chart', [{
            type:'bar', x:[a.analysis.card_name, b.analysis.card_name], y:[sa, sb],
            marker:{color:[scoreColor(sa), scoreColor(sb)]},
            text:[sa >= 0 ? '+'+sa : ''+sa, sb >= 0 ? '+'+sb : ''+sb],
            textposition:'outside', textfont:{color:'#e8e8e8',size:14}, width:0.4,
          }], {
            paper_bgcolor:'#0d0f1a', plot_bgcolor:'#161828',
            font:{color:'#e8e8e8',family:'Nunito'},
            height:280, margin:{l:10,r:60,t:20,b:10},
            shapes:[
              {type:'line',x0:0,x1:1,xref:'paper',y0:0,y1:0,line:{color:'#6b7280',dash:'dash'}},
              {type:'line',x0:0,x1:1,xref:'paper',y0:-25,y1:-25,line:{color:'#22c55e',dash:'dot'}},
              {type:'line',x0:0,x1:1,xref:'paper',y0:25,y1:25,line:{color:'#ef4444',dash:'dot'}},
            ],
            yaxis:{range:[-115,115],gridcolor:'#2a2d45',tickfont:{color:'#6b7280'},title:'Composite Score',titlefont:{color:'#6b7280',size:11}},
            xaxis:{tickfont:{color:'#e8e8e8',size:13}},
            showlegend:false,
          }, {responsive:true, displayModeBar:false});
        })
        .catch(function () {
          document.getElementById('compare-results').innerHTML = '<div class="alert alert-error">Analysis failed. Try different cards.</div>';
        });
    });

    document.getElementById('q-a').addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch('a'); });
    document.getElementById('q-b').addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch('b'); });
  </script>
</body>
</html>
